<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Scopsy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7ff 0%, #e6e9ff 100%);
      color: #333;
      min-height: 100vh;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    .header {
      background: #0a0a0a;
      color: #fff;
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo h1 { font-size: 28px; font-weight: 800; }
    .registered { font-size: .6em; vertical-align: super; }
    .user-info { display: flex; align-items: center; gap: 20px; }
    .user-name { font-weight: 600; }
    .btn-logout {
      background: linear-gradient(90deg, #8c52ff, #00c2ff);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Hero + Título Progresso */
    .progress-hero {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      margin: 40px 20px;
      border-radius: 24px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(140,82,255,.15);
      text-align: center;
    }
    .progress-hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: #111;
    }
    .progress-hero p {
      font-size: 1.3rem;
      color: #555;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Grid de Cards de Progresso */
    .progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 50px;
    }
    .progress-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      text-align: center;
      transition: transform .3s;
    }
    .progress-card:hover { transform: translateY(-8px); }

    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }

    /* Hoje - Barra de Progresso */
    .today-bar {
      height: 16px;
      background: #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      margin: 20px 0;
    }
    .today-fill {
      height: 100%;
      width: 75%;
      background: linear-gradient(90deg, #8c52ff, #00c2ff);
      border-radius: 8px;
    }
    .today-percent {
      font-size: 2.8rem;
      font-weight: 800;
      color: #8c52ff;
    }

    /* Semana - Barras */
    .week-bars {
      display: flex;
      justify-content: space-between;
      align-items: end;
      height: 140px;
      gap: 8px;
      margin: 20px 0;
    }
    .day-bar {
      width: 100%;
      background: #e0e0e0;
      border-radius: 8px 8px 0 0;
      position: relative;
    }
    .day-bar span {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .8rem;
      color: #666;
    }
    .bar-fill { background: linear-gradient(to top, #8c52ff, #00c2ff); border-radius: 8px 8px 0 0; }

    /* Mês - Donut */
    .donut-container {
      width: 160px;
      height: 160px;
      margin: 20px auto;
      position: relative;
    }
    .donut {
      width: 100%;
      height: 100%;
    }
    .donut-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2rem;
      font-weight: 800;
      color: #8c52ff;
    }

    /* Total - Gráfico de Linha */
    .line-chart {
      height: 180px;
      margin: 20px 0;
      background: #f8f9ff;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    .line-chart svg { width: 100%; height: 100%; }

    @media (max-width: 768px) {
      .progress-grid { grid-template-columns: 1fr; }
      .progress-hero h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <h1>Scopsy<span class="registered">®</span></h1>
      </div>
      <div class="user-info">
        <span class="user-name">Usuário Teste</span>
        <button class="btn-logout">Sair</button>
      </div>
    </div>
  </header>

  <!-- Progresso Principal -->
  <div class="progress-hero">
    <h1>Acompanhando seu progresso</h1>
    <p>Veja como suas habilidades clínicas estão evoluindo dia após dia.</p>

    <div class="progress-grid container">

      <!-- Hoje -->
      <div class="progress-card">
        <div class="card-title">Hoje</div>
        <div class="today-percent">75%</div>
        <div class="today-bar"><div class="today-fill"></div></div>
        <p style="color:#666; margin-top:12px;">Meta diária atingida</p>
      </div>

      <!-- Semana -->
      <div class="progress-card">
        <div class="card-title">Semana</div>
        <div class="week-bars">
          <div class="day-bar" style="height:50%"><div class="bar-fill" style="height:60%"></div><span>Seg</span></div>
          <div class="day-bar" style="height:50%"><div class="bar-fill" style="height:80%"></div><span>Ter</span></div>
          <div class="day-bar" style="height:50%"><div class="bar-fill" style="height:40%"></div><span>Qua</span></div>
          <div class="day-bar" style="height:50%"><div class="bar-fill" style="height:90%"></div><span>Qui</span></div>
          <div class="day-bar" style="height:50%"><div class="bar-fill" style="height:100%"></div><span>Sex</span></div>
        </div>
      </div>

      <!-- Mês -->
      <div class="progress-card">
        <div class="card-title">Mês</div>
        <div class="donut-container">
          <svg class="donut" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="#e0e0e0" stroke-width="16"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="url(#gradient)" stroke-width="16"
                    stroke-dasharray="188.4 251.2" transform="rotate(-90 50 50)"/>
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8c52ff"/>
                <stop offset="100%" stop-color="#00c2ff"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="donut-text">75%</div>
        </div>
      </div>

      <!-- Total (Gráfico de Linha) -->
      <div class="progress-card">
        <div class="card-title">Total</div>
        <div class="line-chart">
          <svg viewBox="0 0 400 180" preserveAspectRatio="none">
            <polyline fill="none" stroke="url(#lineGradient)" stroke-width="4"
                      points="20,140 80,110 140,130 200,80 260,100 320,60 380,40"/>
            <defs>
              <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8c52ff"/>
                <stop offset="100%" stop-color="#00c2ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <p style="margin-top:12px; color:#8c52ff; font-weight:600;">+127% em relação ao último mês</p>
      </div>

    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
