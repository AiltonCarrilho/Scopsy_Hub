<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Diagnóstico - Scopsy</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <link rel="shortcut icon" href="favicon.png" />

    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/desafios.css">
    <link rel="stylesheet" href="css/diagnostic.css">
    <link rel="stylesheet" href="css/gamification.css">
    <link rel="stylesheet" href="css/components/cognit-toast.css">
</head>

<body>
    <!-- Header Standardized -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="dashboard.html" class="logo-link">
                    <img src="assets/logo.png" alt="Scopsy Lab" class="logo-icon-img">
                    <h1>Scopsy<span class="text-gradient">Lab</span></h1>
                </a>
            </div>
            <a href="/lab/dashboard" class="btn-back">
                ← Voltar ao Dashboard
            </a>
        </div>
    </header>

    <div class="diagnostic-container">
        <!-- Banner Trial -->
        <div id="trialBanner" class="trial-banner" style="display: none;">
            <div class="trial-content">
                <i data-lucide="clock"></i>
                <span><strong id="trialDaysLeft">0</strong> dias restantes no seu período de teste.</span>
            </div>
            <a href="#" class="btn-upgrade">Assinar Premium</a>
        </div>
        <!-- Painel de Progresso -->
        <div class="icon-target sprite-icon-medium" style="margin-bottom: 12px;"></div>
        <h1>Radar Diagnóstico</h1>
        <p>Treino de reconhecimento diagnóstico - repetição espaçada</p>

        <!-- Painel de Progresso Unificado -->
        <div id="progressPanel" class="progress-panel"></div>

        <div id="caseContainer"></div>
        <div id="feedbackContainer"></div>
    </div>

    <!-- DOMPurify - XSS Protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="js/sanitize.js"></script>

    <script src="js/trial-banner.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/diagnostic.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
