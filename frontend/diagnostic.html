<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Diagnóstico - Scopsy</title>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/desafios.css">
    <link rel="stylesheet" href="css/diagnostic.css">
</head>

<body>
    <!-- Header Standardized -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>Scopsy Lab<span class="registered">®</span></h1>
            </div>
            <a href="dashboard.html" class="btn-back">
                ← Voltar
            </a>
        </div>
    </header>

    <div class="diagnostic-container">
        <!-- Painel de Progresso -->
        <div id="progressPanel" class="progress-panel"></div>

        <h1>🎲 Radar Diagnóstico</h1>
        <p>Treino de reconhecimento diagnóstico - repetição espaçada</p>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalCases">0</div>
                <div class="stat-label">Casos</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Acurácia</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="xpPoints">0</div>
                <div class="stat-label">Cognits</div>
            </div>
        </div>

        <div id="caseContainer"></div>
        <div id="feedbackContainer"></div>
    </div>

    <script src="js/diagnostic.js"></script>
</body>

</html>
