<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Scopsy</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <link rel="shortcut icon" href="favicon.png" />
    <!-- Config deve ser carregado PRIMEIRO -->
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .signup-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 36px;
            color: #667eea;
            margin: 0;
        }

        .registered {
            font-size: 14px;
            vertical-align: super;
        }

        .logo p {
            color: #7f8c8d;
            margin: 5px 0 0 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #7f8c8d;
            font-size: 13px;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-signup:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="logo">
            <h1>Scopsy<span class="registered">®</span></h1>
            <p>Treinamento Inteligente para Psicólogos</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="name" placeholder="Dr. João Silva" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="crp">CRP (opcional)</label>
                <input type="text" id="crp" name="crp" placeholder="06/123456">
                <small>Exemplo: 06/123456</small>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8">
                <small>Mínimo 8 caracteres</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required
                    minlength="8">
            </div>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Criando conta...</p>
            </div>

            <button type="submit" class="btn-signup" id="signupBtn">
                Criar Conta
            </button>
        </form>

        <div class="footer-links">
            <p>Já tem conta? <a href="login.html">Fazer login</a></p>
            <p><a href="index.html">← Voltar para home</a></p>
        </div>
    </div>

    <script>
        // API_URL vem do config.js (window.API_URL)

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const crp = document.getElementById('crp').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const signupBtn = document.getElementById('signupBtn');
            const loading = document.getElementById('loading');

            // Limpar mensagens
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validações
            if (!name || !email || !password) {
                errorDiv.textContent = 'Preencha todos os campos obrigatórios';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'As senhas não coincidem';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'A senha deve ter pelo menos 8 caracteres';
                errorDiv.style.display = 'block';
                return;
            }

            // Desabilitar botão
            signupBtn.disabled = true;
            loading.style.display = 'block';

            try {
                console.log('📡 Criando conta...');

                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        crp: crp || undefined
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao criar conta');
                }

                console.log('✅ Conta criada:', data);

                // Salvar token e usuário
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Mensagem de sucesso
                successDiv.textContent = `Conta criada com sucesso! Bem-vindo, ${data.user.name}!`;
                successDiv.style.display = 'block';

                // Redirecionar
                setTimeout(() => {
                    window.location.href = '/lab';
                }, 1500);

            } catch (error) {
                console.error('❌ Erro ao criar conta:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                signupBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Verificar se já está logado
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');

            if (token) {
                console.log('🔑 Usuário já está logado, redirecionando...');

                const successDiv = document.getElementById('successMessage');
                successDiv.textContent = 'Você já está logado! Redirecionando...';
                successDiv.style.display = 'block';

                setTimeout(() => {
                    window.location.href = '/lab';
                }, 1500);
            }
        });
    </script>
</body>

</html>
