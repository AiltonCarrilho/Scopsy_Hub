<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafios Clínicos - Scopsy Lab</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* SEU CSS OFICIAL 2025 (com ajustes para esta página) */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --purple: #8B5CF6;
      --blue: #3B82F6;
      --gradient-purple-blue: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text: #1F2937;
      --text-light: #6B7280;
      --shadow: 0 20px 40px rgba(139,92,246,0.1);
      --radius: 28px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

    /* Header */
    .header { background: #0F0F0F; padding: 20px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .header .container { max-width: 1240px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .logo h1 { font-size: 28px; font-weight: 900; color: #fff; }
    .registered { font-size: .6em; vertical-align: super; }
    .back-btn { background: rgba(255,255,255,.1); color: #fff; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .back-btn:hover { background: rgba(255,255,255,.2); }

    /* Container */
    .main-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

    /* Hero */
    .page-hero {
      text-align: center;
      margin-bottom: 50px;
      padding: 40px 20px;
    }
    .page-hero h1 {
      font-size: 3.2rem;
      font-weight: 900;
      background: var(--gradient-purple-blue);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .page-hero p {
      font-size: 1.3rem;
      color: var(--text-light);
    }

    /* Novo Momento */
    .new-moment-btn {
      display: block;
      width: 100%;
      max-width: 480px;
      margin: 0 auto 40px;
      padding: 20px;
      background: var(--gradient-purple-blue);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 1.4rem;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 15px 35px rgba(139,92,246,.3);
    }
    .new-moment-btn:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px rgba(139,92,246,.4);
    }

    /* Card do Momento */
    .moment-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }
    .context-badge {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(139,92,246,.1);
      color: var(--purple);
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .context-section {
      background: rgba(139,92,246,.05);
      padding: 24px;
      border-radius: 20px;
      border-left: 6px solid var(--purple);
      margin: 24px 0;
    }
    .critical-moment {
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      padding: 32px;
      border-radius: 20px;
      border-left: 6px solid #fb923c;
      margin: 32px 0;
    }
    .dialogue {
      font-size: 1.3rem;
      font-style: italic;
      line-height: 1.7;
      color: #333;
      margin-bottom: 16px;
    }
    .non-verbal {
      font-size: 1rem;
      color: #e65100;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px dashed #ffb74d;
    }
    .decision-point {
      text-align: center;
      padding: 20px;
      background: #e8f5e9;
      border-radius: 16px;
      font-weight: 700;
      color: #2e7d32;
      font-size: 1.2rem;
      margin: 32px 0;
    }

    /* Opções */
    .options-grid {
      display: grid;
      gap: 16px;
      margin: 32px 0;
    }
    .option-card {
      padding: 20px;
      background: #fff;
      border: 3px solid #e5e7eb;
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 8px 20px rgba(0,0,0,.05);
    }
    .option-card:hover {
      border-color: var(--purple);
      transform: translateY(-6px);
    }
    .option-card.selected {
      border-color: var(--purple);
      background: rgba(139,92,246,.08);
      box-shadow: 0 0 0 4px rgba(139,92,246,.2);
    }
    .option-card.correct { border-color: #10b981; background: #ecfdf5; }
    .option-card.incorrect { border-color: #ef4444; background: #fef2f2; }
    .option-letter {
      display: inline-block;
      width: 40px;
      height: 40px;
      background: var(--gradient-purple-blue);
      color: #fff;
      border-radius: 50%;
      text-align: center;
      line-height: 40px;
      font-weight: 900;
      font-size: 1.2rem;
      margin-right: 16px;
      float: left;
    }
    .option-card.correct .option-letter { background: #10b981; }
    .option-card.incorrect .option-letter { background: #ef4444; }

    /* Raciocínio */
    .reasoning-section {
      margin-top: 32px;
    }
    .reasoning-textarea {
      width: 100%;
      min-height: 100px;
      padding: 20px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      transition: border .3s;
    }
    .reasoning-textarea:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(139,92,246,.15);
    }

    /* Botões */
    .submit-btn, .next-moment-btn {
      background: var(--gradient-purple-blue);
      color: #fff;
      padding: 18px 40px;
      border: none;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 20px;
    }
    .submit-btn:hover, .next-moment-btn:hover { transform: scale(1.05); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    /* Feedback */
    .feedback-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
      margin-top: 40px;
    }
    .feedback-header {
      text-align: center;
      padding: 32px;
      border-radius: 20px;
      margin-bottom: 32px;
      font-size: 2rem;
      font-weight: 800;
    }
    .feedback-header.correct { background: #ecfdf5; color: #10b981; }
    .feedback-header.incorrect { background: #fff7ed; color: #f97316; }
    .feedback-section {
      background: rgba(139,92,246,.05);
      padding: 28px;
      border-radius: 20px;
      margin: 24px 0;
      border-left: 6px solid var(--purple);
    }
    .principle-box {
      background: linear-gradient(135deg, #f0f4ff, #e0e7ff);
      border-left: 6px solid var(--purple);
      padding: 24px;
      margin: 28px 0;
      font-style: italic;
      font-weight: 700;
      color: var(--purple);
      font-size: 1.1rem;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
      font-size: 1.4rem;
    }
    .empty-state h2 { font-size: 2.4rem; margin-bottom: 20px; background: var(--gradient-purple-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    @media (max-width: 768px) {
      .page-hero h1 { font-size: 2.6rem; }
      .moment-card, .feedback-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <h1>Scopsy Lab<span class="registered">®</span></h1>
      </div>
      <button class="back-btn" onclick="window.location.href='case.html'">← Voltar</button>
    </div>
  </header>

  <div class="main-container">

    <!-- Hero -->
    <div class="page-hero">
      <h1>Desafios Clínicos</h1>
      <p>Micro-momentos críticos que exigem decisão imediata — com feedback cuidadoso e instantâneo.</p>
    </div>

    <!-- Novo Momento -->
    <button class="new-moment-btn" onclick="generateNewMoment()">
      Novo Momento Crítico
    </button>

    <!-- Container do Momento -->
    <div id="momentContainer">
      <div class="empty-state">
        <h2>Desafios Clínicos</h2>
        <p>Desafios clínicos de alta intensidade.<br>
           Micro-casos que pedem seu melhor — e recebem um feedback cuidadoso, imediato e cheio de carinho.</p>
      </div>
    </div>

    <div id="feedbackContainer"></div>

  </div>

  <script>
    lucide.createIcons();

    const API_URL = 'http://localhost:3000/api';
    let currentMoment = null;
    let selectedChoice = null;
    let startTime = null;

    async function generateNewMoment() {
      document.getElementById('momentContainer').innerHTML = '<div class="loading">Gerando momento crítico...</div>';
      document.getElementById('feedbackContainer').innerHTML = '';

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/case/generate`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: 'intermediate', moment_type: 'resistencia_tecnica' })
        });
        const data = await res.json();

        if (data.success) {
          currentMoment = { ...data.case, case_id: data.case_id };
          selectedChoice = null;
          startTime = Date.now();
          renderMoment(currentMoment);
        } else {
          document.getElementById('momentContainer').innerHTML = `<div class="moment-card"><p style="color:#ef4444">Erro: ${data.error}</p></div>`;
        }
      } catch (e) {
        document.getElementById('momentContainer').innerHTML = '<div class="moment-card"><p style="color:#ef4444">Erro de conexão</p></div>';
      }
    }

    function renderMoment(m) {
      const ctx = m.context;
      const cm = m.critical_moment;

      let optionsHTML = '';
      m.options.forEach(opt => {
        optionsHTML += `
          <div class="option-card" onclick="selectOption('${opt.letter}', this)">
            <span class="option-letter">${opt.letter}</span>
            <div style="flex:1">
              <strong>${opt.approach}</strong>
              <p style="margin:8px 0 0; color:#666; font-style:italic;">"${opt.response}"</p>
            </div>
          </div>`;
      });

      document.getElementById('momentContainer').innerHTML = `
        <div class="moment-card">
          <span class="context-badge">${ctx.diagnosis || 'Momento Clínico'}</span>
          
          <div class="context-section">
            <h4>CONTEXTO</h4>
            <p><strong>Cliente:</strong> ${ctx.client_name}, ${ctx.client_age} anos • <strong>Sessão:</strong> ${ctx.session_number}</p>
            <p><strong>Acabou de acontecer:</strong> ${ctx.what_just_happened}</p>
          </div>

          <div class="critical-moment">
            <h4 style="margin:0 0 16px; color:#e65100;">MOMENTO CRÍTICO</h4>
            <div class="dialogue">"${cm.dialogue}"</div>
            <div class="non-verbal"><strong>Observação:</strong> ${cm.non_verbal}</div>
          </div>

          <div class="decision-point">${m.decision_point}</div>

          <h4 style="margin:32px 0 16px; font-size:1.4rem;">Sua resposta:</h4>
          <div class="options-grid">${optionsHTML}</div>

          <div class="reasoning-section">
            <label style="display:block; margin-bottom:12px; font-weight:700;">Por que você escolheu esta opção?</label>
            <textarea id="reasoningText" class="reasoning-textarea" placeholder="Explique seu raciocínio em 1-2 frases..."></textarea>
          </div>

          <button class="submit-btn" id="submitBtn" onclick="submitDecision()" disabled>Confirmar Decisão</button>
        </div>`;
    }

    function selectOption(letter, el) {
      document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedChoice = letter;
      document.getElementById('submitBtn').disabled = false;
    }

    async function submitDecision() {
      if (!selectedChoice) return;
      const reasoning = document.getElementById('reasoningText').value.trim();
      const timeSpent = Math.floor((Date.now() - startTime) / 1000);

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Analisando...';

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/case/analyze`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            case_data: { ...currentMoment, case_id: currentMoment.case_id },
            user_choice: selectedChoice,
            user_reasoning: reasoning,
            time_spent_seconds: timeSpent
          })
        });
        const data = await res.json();

        if (data.success) showFeedback(data.feedback, selectedChoice);
      } catch (e) { console.error(e); }

      btn.disabled = false;
      btn.textContent = 'Confirmar Decisão';
    }

    function showFeedback(f, userChoice) {
      document.querySelectorAll('.option-card').forEach(card => {
        card.style.pointerEvents = 'none';
        const letter = card.querySelector('.option-letter').textContent;
        if (letter === f.expert_choice) card.classList.add('correct');
        else if (letter === userChoice && !f.is_correct) card.classList.add('incorrect');
      });

      const er = f.expert_reasoning;
      const lp = f.learning_point;

      const fb = `
        <div class="feedback-card">
          <div class="feedback-header ${f.is_correct ? 'correct' : 'incorrect'}">
            <h2>${f.immediate_feedback}</h2>
            <p style="margin-top:12px; font-size:1.2rem;">
              ${f.is_correct ? 'Você pensou como um clínico experiente!' : 'Vamos crescer juntos com este aprendizado'}
            </p>
          </div>

          ${f.user_reasoning_analysis ? `<div class="feedback-section"><h4>Seu Raciocínio</h4><p style="font-style:italic;">${f.user_reasoning_analysis}</p></div>` : ''}

          <div class="feedback-section"><h4>Por que ${f.expert_choice} é a melhor escolha</h4><p>${er.why_this_works || ''}</p></div>

          ${er.core_principle ? `<div class="principle-box">PRINCÍPIO CLÍNICO: "${er.core_principle}"</div>` : ''}

          ${lp ? `<div class="feedback-section" style="background:#ecfdf5;"><h4>Aprendizado</h4><p><strong>Padrão:</strong> ${lp.pattern_to_recognize}</p><p><strong>Resposta ideal:</strong> ${lp.instant_response}</p></div>` : ''}

          <button class="next-moment-btn" onclick="generateNewMoment()">Próximo Momento Crítico</button>
        </div>`;

      document.getElementById('feedbackContainer').innerHTML = fb;
      document.getElementById('feedbackContainer').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
