<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Diagnóstico - Scopsy Lab</title>

  <!-- Fontes & Ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #333;
      line-height: 1.6;
    }
    a { text-decoration: none; }

    /* Header (igual ao dashboard) */
    .header {
      background: #0a0a0a;
      color: #fff;
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    .header .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo h1 { font-size: 28px; font-weight: 800; }
    .registered { font-size: .6em; vertical-align: super; }
    .back-btn {
      background: rgba(255,255,255,.15);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      transition: background .2s;
    }
    .back-btn:hover { background: rgba(255,255,255,.25); }

    /* Container principal */
    .main-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Hero da página */
    .page-hero {
      text-align: center;
      margin-bottom: 50px;
    }
    .page-hero h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #8c52ff, #00c2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .page-hero p {
      font-size: 1.3rem;
      color: #555;
    }

    /* Stats Bar */
    .stats-bar {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: flex;
      justify-content: space-around;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .stat-item {
      text-align: center;
      min-width: 120px;
    }
    .stat-value {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #8c52ff, #00c2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 0.95rem;
      color: #666;
      margin-top: 6px;
    }

    /* Card do Caso */
    .case-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(140,82,255,.12);
      margin-bottom: 30px;
    }
    .vignette {
      background: linear-gradient(135deg, #f8f5ff 0%, #f0f7ff 100%);
      padding: 28px;
      border-radius: 16px;
      border-left: 6px solid #8c52ff;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #333;
      margin: 24px 0;
    }

    /* Opções */
    .options-grid {
      display: grid;
      gap: 16px;
      margin: 30px 0;
    }
    .option-button {
      padding: 20px;
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      transition: all .3s ease;
      font-size: 1rem;
      text-align: left;
      box-shadow: 0 4px 15px rgba(0,0,0,.05);
    }
    .option-button:hover {
      border-color: #8c52ff;
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(140,82,255,.15);
    }
    .option-button.selected {
      border-color: #8c52ff;
      background: #f8f5ff;
      box-shadow: 0 0 0 4px rgba(140,82,255,.15);
    }
    .option-button.correct {
      border-color: #10b981;
      background: #ecfdf5;
      box-shadow: 0 0 0 4px rgba(16,185,129,.15);
    }
    .option-button.incorrect {
      border-color: #ef4444;
      background: #fef2f2;
      box-shadow: 0 0 0 4px rgba(239,68,68,.15);
    }

    /* Botões */
    .submit-btn, .next-case-btn {
      background: linear-gradient(90deg, #8c52ff, #00c2ff);
      color: #fff;
      padding: 16px 40px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .2s;
      margin-top: 10px;
    }
    .submit-btn:hover, .next-case-btn:hover { transform: scale(1.05); }
    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    /* Feedback */
    .feedback-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(140,82,255,.12);
      margin-top: 30px;
    }
    .feedback-section {
      background: #f8f9ff;
      padding: 24px;
      border-radius: 16px;
      margin: 20px 0;
      border-left: 5px solid #8c52ff;
    }
    .feedback-section h4 {
      margin: 0 0 12px 0;
      color: #8c52ff;
      font-size: 1.3rem;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.3rem;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <h1>Scopsy Lab<span class="registered">®</span></h1>
      </div>
      <button class="back-btn" onclick="window.location.href='dashboard.html'">← Voltar</button>
    </div>
  </header>

  <div class="main-container">

    <!-- Hero da página -->
    <div class="page-hero">
      <h1>Radar Diagnóstico</h1>
      <p>Treine seu olhar diagnóstico com casos reais, repetição espaçada e feedback profundo</p>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <div class="stat-value" id="totalCases">0</div>
        <div class="stat-label">Casos Respondidos</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="accuracy">0%</div>
        <div class="stat-label">Acurácia</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="xpPoints">0</div>
        <div class="stat-label">XP Acumulado</div>
      </div>
    </div>

    <!-- Container do caso -->
    <div id="caseContainer"></div>
    <div id="feedbackContainer"></div>

  </div>

  <script>
    lucide.createIcons();

    const API_URL = 'http://localhost:3000/api';
    let currentCase = null;
    let caseStartTime = null;
    let selectedAnswer = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      generateNewCase();
    });

    async function loadStats() {
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(API_URL + '/diagnostic/stats', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('totalCases').textContent = data.progress.total_diagnoses || 0;
          document.getElementById('accuracy').textContent = (data.progress.accuracy_rate || 0).toFixed(1) + '%';
          document.getElementById('xpPoints').textContent = data.progress.xp_points || 0;
        }
      } catch (e) { console.error(e); }
    }

    async function generateNewCase() {
      document.getElementById('caseContainer').innerHTML = '<div class="loading">Gerando caso diagnóstico...<br><small>Pode levar 10-15 segundos</small></div>';
      document.getElementById('feedbackContainer').innerHTML = '';

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(API_URL + '/diagnostic/generate-case', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ level: 'intermediate', category: 'anxiety' })
        });
        const data = await res.json();

        if (data.success) {
          currentCase = { ...data.case, case_id: data.case_id, from_cache: data.from_cache };
          caseStartTime = Date.now();
          selectedAnswer = null;
          renderCase(currentCase);
        } else {
          document.getElementById('caseContainer').innerHTML = `<div class="case-card"><p style="color:#e74c3c">Erro: ${data.error}</p></div>`;
        }
      } catch (e) {
        document.getElementById('caseContainer').innerHTML = '<div class="case-card"><p style="color:#e74c3c">Erro de conexão com o servidor.</p></div>';
      }
    }

    function renderCase(c) {
      const vignette = c.clinical_content?.vignette || 'Vinheta não disponível';
      const options = c.question_format?.options || [];

      let html = `
        <div class="case-card">
          <h3>Caso Clínico</h3>
          <div class="vignette">${vignette}</div>
          <h4 style="margin:24px 0 16px; font-size:1.4rem;">Qual é o diagnóstico principal?</h4>
          <div class="options-grid" id="optionsGrid">
      `;

      options.forEach((opt, i) => {
        html += `<button class="option-button" data-answer="${opt}" onclick="selectOption('${opt.replace(/'/g, "\\'")}', this)">
          ${String.fromCharCode(65 + i)}. ${opt}
        </button>`;
      });

      html += `
          </div>
          <button class="submit-btn" id="submitBtn" disabled>Enviar Resposta</button>
        </div>`;

      document.getElementById('caseContainer').innerHTML = html;
    }

    function selectOption(answer, el) {
      document.querySelectorAll('.option-button').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedAnswer = answer;
      document.getElementById('submitBtn').disabled = false;
    }

    async function submitAnswer() {
      if (!selectedAnswer) return;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Processando...';

      const timeSpent = Math.floor((Date.now() - caseStartTime) / 1000);

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(API_URL + '/diagnostic/submit-answer', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            case_id: currentCase.case_id,
            user_answer: selectedAnswer,
            correct_diagnosis: currentCase.diagnostic_structure?.correct_diagnosis,
            time_spent_seconds: timeSpent,
            case_data: currentCase
          })
        });
        const data = await res.json();

        if (data.success) {
          showResult(data.is_correct, data.feedback);
          loadStats();
        }
      } catch (e) { console.error(e); }

      btn.textContent = 'Enviar Resposta';
    }

    function showResult(correct, feedback) {
      document.querySelectorAll('.option-button').forEach(btn => {
        btn.disabled = true;
        const ans = btn.getAttribute('data-answer');
        if (ans === currentCase.diagnostic_structure?.correct_diagnosis) btn.classList.add('correct');
        else if (ans === selectedAnswer && !correct) btn.classList.add('incorrect');
      });

      let fbHTML = `
        <div class="feedback-card">
          <h3 style="font-size:2rem; margin-bottom:20px;">
            ${correct ? 'Correto!' : 'Incorreto'}
          </h3>
      `;

      if (feedback?.feedback_eco) {
        const f = feedback.feedback_eco;
        fbHTML += `
          <div class="feedback-section"><h4>Explicação</h4><p>${f.explicar?.what_happened || ''}</p></div>
          <div class="feedback-section"><h4>Conexão Teórica</h4><p>${f.conectar?.theory_connection || ''}</p></div>
          <div class="feedback-section"><h4>O que focar agora</h4><p>${f.orientar?.what_to_focus_next || ''}</p></div>
        `;
      }

      fbHTML += `<button class="next-case-btn" onclick="generateNewCase()">Próximo Caso →</button></div>`;
      document.getElementById('feedbackContainer').innerHTML = fbHTML;
    }
  </script>
</body>
</html>
