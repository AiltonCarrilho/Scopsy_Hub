<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Clínica - Scopsy Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/jornada.css">
</head>

<body>
    <!-- Header Standardized -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>Scopsy Lab<span class="registered">®</span></h1>
                <div style="color: #00ff00; font-size: 12px; margin-top: 4px;"></div>
            </div>
            <a href="/lab" class="btn-back">
                ← Voltar ao Dashboard
            </a>
        </div>
    </header>

    <!-- Banner Trial -->
    <div id="trialBanner" class="trial-banner" style="display: none;">
        <div class="trial-content">
            <i data-lucide="clock"></i>
            <span><strong id="trialDaysLeft">0</strong> dias restantes no seu período de teste.</span>
        </div>
        <a href="#" class="btn-upgrade">Assinar Premium</a>
    </div>

    <div class="container">
        <!-- LAYOUT COM MENU LATERAL -->
        <div class="journey-layout">
            <!-- MENU LATERAL DE SESSÕES -->
            <div class="sessions-sidebar" id="sessionsSidebar">
                <div class="sidebar-header">
                    <h3>Sessões</h3>
                    <div class="sessions-count" id="sessionsCount">12 disponíveis</div>
                </div>
                <div class="sessions-menu" id="sessionsMenu">
                    <div class="loading-small">Carregando sessões...</div>
                </div>
            </div>

            <!-- CONTEÚDO PRINCIPAL -->
            <div class="main-content">
                <!-- PROGRESS -->
                <div class="progress-container" id="progressContainer" style="display: none;">
                    <div class="progress-header">
                        <div class="progress-title">Progresso do Tratamento</div>
                        <div class="session-counter" id="sessionCounter">Sessão 1/12</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 8.33%"></div>
                    </div>
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">Rapport</div>
                            <div class="metric-value" id="metricRapport">0</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Insight</div>
                            <div class="metric-value" id="metricInsight">0</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Mudança</div>
                            <div class="metric-value" id="metricBehavioral">0</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Redução</div>
                            <div class="metric-value" id="metricSymptom">0</div>
                        </div>
                    </div>
                </div>

                <!-- SESSION CONTENT -->
                <div id="sessionContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Carregando jornada...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== JAVASCRIPT ========== -->
    <!-- Carregar configuração centralizada e utilitários de auth -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/trial-banner.js"></script>

    <script>
        // API_URL definida globalmente em config.js
        // Criar constante local com sufixo /api para uso neste arquivo
        const JOURNEY_API_URL = window.API_URL + '/api';

        // Obter usuário logado dinamicamente
        const currentUser = getUser(); // Função do auth.js
        if (!currentUser) {
            window.location.href = 'login.html';
        }
        const USER_ID = currentUser.id;

        // Estado global
        let currentJourneyId = null;
        let availableJourneys = []; // Lista de todas as jornadas disponíveis
        let currentSessionNumber = 1;
        let selectedOption = null;
        let sessionStartTime = null;
        let allSessions = []; // Armazena todas as sessões carregadas

        // ========================================
        // CARREGAR JORNADAS DISPONÍVEIS
        // ========================================
        async function loadJourneys() {
            try {
                const response = await fetch(`${JOURNEY_API_URL}/journey/list`);
                const data = await response.json();

                if (!data.success || data.journeys.length === 0) {
                    throw new Error('Nenhuma jornada disponível');
                }

                availableJourneys = data.journeys;
                console.log('📚 Jornadas carregadas:', availableJourneys.length);

            } catch (error) {
                console.error('❌ Erro ao carregar jornadas:', error);
                availableJourneys = [];
            }
        }

        // Cache de sessões por jornada
        let sessionsCache = {};
        let lastLoadedJourney = null;

        // ========================================
        // CARREGAR TODAS AS SESSÕES
        // ========================================
        async function loadAllSessions(forceReload = false) {
            try {
                // Usar cache se disponível e não forçar reload
                if (!forceReload &&
                    sessionsCache[currentJourneyId] &&
                    lastLoadedJourney === currentJourneyId) {
                    console.log('📦 Usando cache de sessões');
                    allSessions = sessionsCache[currentJourneyId];
                    renderSessionsMenu(allSessions);
                    updateSessionsCount();
                    return;
                }

                // Mostrar loading no menu
                document.getElementById('sessionsMenu').innerHTML = `
                    <div class="loading-small">Carregando sessões...</div>
                `;

                const url = `${JOURNEY_API_URL}/journey/${currentJourneyId}/sessions?user_id=${USER_ID}`;
                console.log('🔍 Carregando sessões da API:', url);

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Erro ao carregar sessões');
                }

                allSessions = data.sessions;

                // Atualizar cache
                sessionsCache[currentJourneyId] = allSessions;
                lastLoadedJourney = currentJourneyId;

                renderSessionsMenu(allSessions);
                updateSessionsCount();

            } catch (error) {
                console.error('❌ Erro ao carregar sessões:', error);
                console.error('❌ Stack trace:', error.stack);
                console.error('❌ Journey ID:', currentJourneyId);
                console.error('❌ API URL:', JOURNEY_API_URL);

                // Tratamento especial para erro 429 (Rate Limit)
                let errorMessage = '';
                if (error.message.includes('429')) {
                    errorMessage = `
                        <div style="padding: 16px; color: #ff9800; text-align: center;">
                            <div style="font-size: 2rem; margin-bottom: 8px;">⏱️</div>
                            <strong>Muitas requisições</strong><br>
                            <small style="color: #666;">Aguarde 1 minuto e recarregue a página</small><br>
                            <div style="margin-top: 12px; font-size: 0.85rem; color: #999;">
                                O servidor está protegido contra sobrecarga.<br>
                                Isso acontece durante testes intensivos.
                            </div>
                            <button class="btn btn-primary" onclick="window.location.reload()"
                                    style="margin-top: 16px; font-size: 0.9rem;">
                                🔄 Recarregar Página
                            </button>
                        </div>
                    `;
                } else {
                    errorMessage = `
                        <div style="padding: 16px; color: #f44336; text-align: center;">
                            <strong>Erro ao carregar sessões</strong><br>
                            <small>${error.message}</small><br>
                            <small style="color: #999;">Journey: ${currentJourneyId}</small><br>
                            <button class="btn btn-primary" onclick="loadAllSessions(true)"
                                    style="margin-top: 12px; font-size: 0.9rem;">
                                🔄 Tentar Novamente
                            </button>
                        </div>
                    `;
                }

                document.getElementById('sessionsMenu').innerHTML = errorMessage;
            }
        }

        // Helper para atualizar contador
        function updateSessionsCount() {
            document.getElementById('sessionsCount').textContent =
                `${allSessions.length} ${allSessions.length === 1 ? 'sessão' : 'sessões'}`;
        }

        // ========================================
        // RENDERIZAR MENU DE SESSÕES
        // ========================================
        function renderSessionsMenu(sessions) {
            const html = sessions.map(session => {
                const isCurrent = session.session_number === currentSessionNumber;
                const isCompleted = session.is_completed === true; // Força verificação boolean

                const skillName = session.skill ? session.skill.name : 'Sem habilidade';
                const skillIcon = getSkillModuleIcon(session.skill?.module);

                return `
                    <div class="session-menu-item ${isCurrent ? 'active' : ''} ${isCompleted ? 'completed' : ''}"
                         data-session-number="${session.session_number}">
                        <div class="session-number">
                            ${isCompleted ? '✓' : session.session_number}
                        </div>
                        <div class="session-info">
                            <div class="session-title-small">${session.session_title}</div>
                            <div class="session-skill">${skillIcon} ${skillName}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('sessionsMenu').innerHTML = html || `
                <div style="padding: 16px; text-align: center; color: var(--text-secondary);">
                    Nenhuma sessão encontrada
                </div>
            `;

            // ✅ Adicionar listeners aos itens do menu de sessões
            attachSessionMenuListeners();
        }

        // ========================================
        // ADICIONAR LISTENERS AO MENU DE SESSÕES
        // ========================================
        function attachSessionMenuListeners() {
            const menuItems = document.querySelectorAll('.session-menu-item');
            menuItems.forEach(item => {
                const sessionNumber = parseInt(item.getAttribute('data-session-number'));
                if (sessionNumber) {
                    item.addEventListener('click', () => {
                        loadSession(sessionNumber, true);
                    });
                }
            });
        }

        // ========================================
        // HELPER: Ícone do módulo de habilidade
        // ========================================
        function getSkillModuleIcon(module) {
            const icons = {
                fundamentos: '🌿',
                formulacao: '🔍',
                intervencao: '⚙️',
                consolidacao: '🌱',
                metacompetencias: '💎'
            };
            return icons[module] || '●';
        }

        // ========================================
        // INICIALIZAR
        // ========================================
        async function init() {
            try {
                console.log('🚀 Inicializando Jornada Clínica...');

                // Carregar lista de jornadas (para lógica de "Novo Caso")
                await loadJourneys();

                // Verificar se há journey ID salvo no localStorage (de "Novo Caso")
                const savedJourneyId = localStorage.getItem('scopsy_current_journey_id');

                if (savedJourneyId) {
                    currentJourneyId = savedJourneyId;
                    console.log(`📂 Journey ID carregado do localStorage: ${currentJourneyId}`);
                } else {
                    // Fallback: usar primeiro da lista ou padrão
                    if (availableJourneys.length > 0) {
                        currentJourneyId = availableJourneys[0].id;
                    } else {
                        currentJourneyId = "b438bc8c-8f25-4def-90f5-bca524876366"; // Carolina - TAG
                    }
                    console.log(`📋 Usando journey ID: ${currentJourneyId}`);
                }

                await loadAllSessions();
                await checkProgress();

                console.log('✅ Inicialização completa');

            } catch (error) {
                console.error('❌ Erro ao inicializar:', error);
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="session-card">
                        <p style="color: #f44336;">Erro ao carregar jornada: ${error.message}</p>
                        <button class="btn btn-primary" onclick="window.location.reload()" style="margin-top: 16px;">
                            🔄 Recarregar Página
                        </button>
                    </div>
                `;
            }
        }

        // ========================================
        // VERIFICAR PROGRESSO
        // ========================================
        async function checkProgress() {
            try {
                const response = await fetch(`${JOURNEY_API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`);
                const data = await response.json();

                if (data.progress) {
                    if (data.progress.is_completed) {
                        console.log('✅ Jornada já completa - mostrando resultado final');
                        updateProgress(data.progress);
                        document.getElementById('progressContainer').style.display = 'block';
                        showCompletion(data.progress);
                        return;
                    }

                    currentSessionNumber = data.progress.current_session;
                    updateProgress(data.progress);
                    loadSession(currentSessionNumber);
                } else {
                    await startJourney();
                }

            } catch (error) {
                console.error('Erro ao verificar progresso:', error);
            }
        }

        // ========================================
        // INICIAR JORNADA
        // ========================================
        async function startJourney() {
            try {
                const response = await fetch(`${JOURNEY_API_URL}/journey/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        journey_id: currentJourneyId,
                        user_id: USER_ID
                    })
                });

                const data = await response.json();

                if (data.success) {
                    updateProgress(data.progress);
                    loadSession(1);
                }

            } catch (error) {
                console.error('Erro ao iniciar jornada:', error);
            }
        }

        // Estado para prevenir chamadas simultâneas
        let isLoadingSession = false;

        // ========================================
        // CARREGAR SESSÃO
        // ========================================
        async function loadSession(sessionNumber, freeMode = false) {
            // Prevenir múltiplas chamadas simultâneas
            if (isLoadingSession) {
                console.log('⏳ Já carregando sessão, ignorando clique duplicado');
                return;
            }

            try {
                isLoadingSession = true;

                // Mostrar loading
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Carregando sessão ${sessionNumber}...</p>
                    </div>
                `;

                currentSessionNumber = sessionNumber;
                sessionStartTime = Date.now();

                let url = `${JOURNEY_API_URL}/journey/${currentJourneyId}/session/${sessionNumber}?user_id=${USER_ID}`;
                if (freeMode) {
                    url += '&free_mode=true';
                }

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    renderSession(data.session, data.previous_decision);
                    document.getElementById('progressContainer').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Erro ao carregar sessão');
                }

            } catch (error) {
                console.error('❌ Erro ao carregar sessão:', error);
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="session-card">
                        <p style="color: #f44336;">❌ Erro ao carregar sessão ${sessionNumber}</p>
                        <p style="color: #666; font-size: 0.9rem;">${error.message}</p>
                        <button class="btn btn-primary" onclick="loadSession(${sessionNumber})" style="margin-top: 16px;">
                            🔄 Tentar Novamente
                        </button>
                    </div>
                `;
            } finally {
                isLoadingSession = false;
            }
        }

        // ========================================
        // RENDERIZAR SESSÃO (com objetivo didático)
        // ========================================
        function renderSession(session, previousDecision) {
            const phaseName = {
                'assessment': 'Avaliação',
                'psychoeducation': 'Psicoeducação',
                'intervention': 'Intervenção',
                'consolidation': 'Consolidação',
                'termination': 'Encerramento'
            }[session.session_phase] || session.session_phase;

            const phaseColor = {
                assessment: "#4CAF50",
                psychoeducation: "#2196F3",
                intervention: "#9C27B0",
                consolidation: "#FF9800",
                termination: "#F44336"
            }[session.session_phase] || "#607D8B";

            const didacticSummary = generateContextualSummary(session.session_number);

            let html = `
                <div class="session-card">
                    <div class="session-header">
                        <h2 class="session-title">${session.session_title}</h2>
                        <span class="session-phase" style="background:${phaseColor}33; color:${phaseColor}">
                            ${phaseName}
                        </span>
                    </div>

                    <div class="context-section" style="border-left-color:${phaseColor};">
                        <div class="context-title">🎓 Objetivo Didático da Sessão</div>
                        <div class="context-text">
                            ${didacticSummary}
                        </div>
                    </div>

                    <div class="context-section">
                        <div class="context-title">📋 Contexto Clínico</div>
                        <div class="context-text">${session.context}</div>
                    </div>

                    ${session.homework_review ? `
                        <div class="context-section" style="border-left-color: #ff9800;">
                            <div class="context-title">📝 Review do Homework</div>
                            <div class="context-text">${session.homework_review}</div>
                        </div>
                    ` : ''}

                    <div class="decision-section">
                        <div class="decision-prompt">
                            💭 ${session.decision_prompt}
                        </div>

                        <div class="options" id="optionsContainer">
                            ${session.options.map(opt => `
                                <div class="option ${previousDecision && previousDecision.option_chosen === opt.label ? 'selected' : ''}"
                                     data-option="${opt.label}">
                                    <div class="option-label">${opt.label}</div>
                                    <div class="option-content">
                                        <div class="option-text">${opt.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="feedback-section" id="feedbackSection"></div>

                    <div class="actions">
                        ${previousDecision ? `
                            <button class="btn btn-primary" id="nextSessionBtn">
                                Próxima Sessão →
                            </button>
                        ` : `
                            <button class="btn btn-primary" id="submitBtn" disabled>
                                Confirmar Decisão
                            </button>
                        `}
                    </div>
                </div>
            `;

            document.getElementById('sessionContainer').innerHTML = html;

            // ✅ Adicionar event listeners APÓS renderizar
            attachSessionListeners(previousDecision);

            if (previousDecision) {
                const option = session.options.find(o => o.label === previousDecision.option_chosen);
                if (option) {
                    showFeedback(option.feedback, previousDecision.option_chosen);
                }
            }
        }

        // ========================================
        // ANEXAR EVENT LISTENERS
        // ========================================
        function attachSessionListeners(hasPreviousDecision) {
            // Listeners para opções
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.addEventListener('click', function () {
                    selectOption(this);
                });
            });

            // Listener para botão submit ou nextSession
            if (hasPreviousDecision) {
                const nextBtn = document.getElementById('nextSessionBtn');
                if (nextBtn) {
                    nextBtn.addEventListener('click', nextSession);
                }
            } else {
                const submitBtn = document.getElementById('submitBtn');
                if (submitBtn) {
                    submitBtn.addEventListener('click', submitDecision);
                }
            }
        }

        // ========================================
        // SELECIONAR OPÇÃO
        // ========================================
        function selectOption(element) {
            // Remove seleção anterior
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // Adiciona seleção atual
            element.classList.add('selected');

            // Pega label da opção
            const label = element.getAttribute('data-option');
            selectedOption = label;

            // Habilita botão de submit
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) submitBtn.disabled = false;
        }

        // ========================================
        // SUBMETER DECISÃO
        // ========================================
        async function submitDecision() {
            if (!selectedOption) return;

            const btn = document.getElementById('submitBtn');
            if (!btn || btn.disabled) return; // Evita duplo clique

            try {
                // Desabilitar botão e mostrar loading
                btn.disabled = true;
                btn.textContent = 'Enviando...';

                const timeTaken = Math.floor((Date.now() - sessionStartTime) / 1000);

                // Desabilitar opções
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.add('disabled');
                    opt.style.pointerEvents = 'none';
                });

                const response = await fetch(
                    `${JOURNEY_API_URL}/journey/${currentJourneyId}/session/${currentSessionNumber}/decide?user_id=${USER_ID}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            option_chosen: selectedOption,
                            time_taken_seconds: timeTaken,
                            user_id: USER_ID
                        })
                    }
                );

                const data = await response.json();

                if (data.success) {
                    showFeedback(data.feedback, selectedOption);

                    await refreshProgress();

                    // Recarregar sessões para atualizar status de completude (forçar reload)
                    await loadAllSessions(true);

                    // Substituir botão
                    btn.outerHTML = `
                        <button class="btn btn-primary" id="nextSessionBtnAfterDecision">
                            ${data.is_completed ? 'Ver Resultado Final →' : 'Próxima Sessão →'}
                        </button>
                    `;

                    // ✅ Adicionar listener ao novo botão
                    const nextBtn = document.getElementById('nextSessionBtnAfterDecision');
                    if (nextBtn) {
                        nextBtn.addEventListener('click', nextSession);
                    }
                } else {
                    throw new Error(data.error || 'Erro ao processar decisão');
                }

            } catch (error) {
                console.error('❌ Erro ao submeter decisão:', error);
                alert('Erro ao registrar decisão. Tente novamente.');

                // Re-habilitar botão em caso de erro
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Confirmar Decisão';
                }

                // Re-habilitar opções
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.remove('disabled');
                    opt.style.pointerEvents = 'auto';
                });
            }
        }

        // ========================================
        // MOSTRAR FEEDBACK
        // ========================================
        // ========================================
        // MOSTRAR FEEDBACK (GOLD STANDARD)
        // ========================================
        function showFeedback(feedback, optionChosen) {
            const isOptimal = feedback.is_optimal;

            // Configuração baseada no tipo de decisão
            const config = isOptimal ? {
                headerClass: 'optimal',
                icon: '🌟',
                title: 'Intervenção Eficaz',
                subtitle: 'Você demonstrou excelente julgamento clínico.'
            } : {
                headerClass: 'learning',
                icon: '💡',
                title: 'Oportunidade de Aprendizado',
                subtitle: 'Analise o impacto para ajustar sua abordagem.'
            };

            const html = `
                <div class="feedback-container">
                    <div class="feedback-card-premium">
                        <!-- Header Premium -->
                        <div class="feedback-header ${config.headerClass}">
                            <div class="feedback-badge">
                                ${config.icon}
                            </div>
                            <div class="feedback-title-group">
                                <h3>${config.title}</h3>
                                <div class="feedback-subtitle">${config.subtitle}</div>
                            </div>
                        </div>

                        <div class="feedback-body">
                            <!-- 1. Reação do Paciente -->
                            <div class="client-reaction-box">
                                <div class="reaction-label">Reação do Paciente</div>
                                <div class="reaction-text">"${feedback.immediate}"</div>
                            </div>

                            <!-- 2. Insight do Supervisor -->
                            <div class="supervisor-insight">
                                <div class="supervisor-icon">👨‍⚕️ Nota de Supervisão</div>
                                <div class="insight-content">
                                    ${feedback.explanation}
                                </div>
                            </div>

                            <!-- 3. Impacto Visual -->
                            <div class="impact-section">
                                <div class="reaction-label" style="margin-bottom: 12px;">Impacto nas Competências</div>
                                <div class="impact-grid">
                                    ${generateMetricCard('Rapport', feedback.impact.rapport)}
                                    ${generateMetricCard('Insight', feedback.impact.insight)}
                                    ${generateMetricCard('Mudança', feedback.impact.behavioral_change)}
                                    ${generateMetricCard('Sintomas', feedback.impact.symptom_reduction)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const feedbackEl = document.getElementById('feedbackSection');
            feedbackEl.innerHTML = html;
            feedbackEl.classList.add('show');

            // Animar as barras de progresso após renderizar
            setTimeout(() => animateMetrics(feedback.impact), 100);
        }

        // Helper para gerar card de métrica
        function generateMetricCard(label, value) {
            const isPos = value > 0;
            const isNeg = value < 0;
            const type = isPos ? 'positive' : (isNeg ? 'negative' : 'neutral');
            const sign = isPos ? '+' : '';

            // Largura base 50% + valor ajustado (max ~10)
            // Ex: +5 -> 50% + 25% = 75%
            // Ex: -3 -> 50% - 15% = 35%
            const width = 50 + (value * 5);
            const clampedWidth = Math.min(Math.max(width, 10), 100);

            return `
                <div class="impact-metric-card">
                    <div class="metric-header">
                        <span>${label}</span>
                        <span class="metric-delta ${isPos ? 'pos' : (isNeg ? 'neg' : '')}">
                            ${sign}${value}
                        </span>
                    </div>
                    <div class="metric-bar-bg">
                        <div class="metric-bar-fill ${type}" 
                             style="width: 0%" 
                             data-target-width="${clampedWidth}%">
                        </div>
                    </div>
                </div>
            `;
        }

        // Helper para animar métricas
        function animateMetrics() {
            document.querySelectorAll('.metric-bar-fill').forEach(bar => {
                const target = bar.getAttribute('data-target-width');
                bar.style.width = target;
            });
        }

        // ========================================
        // ATUALIZAR PROGRESSO
        // ========================================
        function updateProgress(progress) {
            const percentage = (progress.current_session / 12) * 100;

            document.getElementById('sessionCounter').textContent =
                `Sessão ${progress.current_session}/12`;
            document.getElementById('progressFill').style.width = `${percentage}%`;

            document.getElementById('metricRapport').textContent = progress.total_rapport;
            document.getElementById('metricInsight').textContent = progress.total_insight;
            document.getElementById('metricBehavioral').textContent = progress.total_behavioral_change;
            document.getElementById('metricSymptom').textContent = progress.total_symptom_reduction;
        }

        // ========================================
        // REFRESH PROGRESSO
        // ========================================
        async function refreshProgress() {
            try {
                const response = await fetch(
                    `${JOURNEY_API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`
                );
                const data = await response.json();

                if (data.success && data.progress) {
                    updateProgress(data.progress);
                }
            } catch (error) {
                console.error('Erro ao atualizar progresso:', error);
            }
        }

        // ========================================
        // PRÓXIMA SESSÃO
        // ========================================
        async function nextSession(e) {
            try {
                // Desabilitar botão
                const btn = e?.target || document.getElementById('nextSessionBtn') || document.getElementById('nextSessionBtnAfterDecision');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Carregando...';
                }

                // Buscar progresso atualizado
                const response = await fetch(
                    `${JOURNEY_API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`
                );
                const data = await response.json();

                if (data.progress.is_completed) {
                    // Jornada completa
                    showCompletion(data.progress);
                } else {
                    // Atualizar número da sessão atual
                    currentSessionNumber = data.progress.current_session;
                    selectedOption = null;

                    // Atualizar progresso no topo
                    updateProgress(data.progress);

                    // Recarregar sessões (forçar reload para pegar is_completed atualizado)
                    await loadAllSessions(true);

                    // Carregar próxima sessão
                    await loadSession(currentSessionNumber);

                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (error) {
                console.error('Erro ao avançar:', error);
                alert('Erro ao carregar próxima sessão.');

                const btn = e?.target;
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Próxima Sessão →';
                }
            }
        }

        // ========================================
        // MOSTRAR CONCLUSÃO
        // ========================================
        function showCompletion(progress) {
            const effectivenessLabels = {
                'excellent': '🌟 Excelente',
                'good': '👍 Bom',
                'moderate': '📊 Moderado',
                'poor': '📉 Baixo'
            };

            const html = `
                <div class="completion-card">
                    <div class="completion-icon">🎉</div>
                    <div class="completion-title">Jornada Completa!</div>
                    <div class="completion-score">${progress.final_score}/100</div>
                    <div class="completion-effectiveness">
                        ${effectivenessLabels[progress.treatment_effectiveness]}
                    </div>
                    
                    <div class="completion-metrics">
                        <div class="completion-metric">
                            <div class="completion-metric-label">Rapport</div>
                            <div class="completion-metric-value">${progress.total_rapport}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Insight</div>
                            <div class="completion-metric-value">${progress.total_insight}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Mudança</div>
                            <div class="completion-metric-value">${progress.total_behavioral_change}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Redução</div>
                            <div class="completion-metric-value">${progress.total_symptom_reduction}</div>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 24px;">
                        <button class="btn btn-primary" id="newCaseBtn"
                                style="background: var(--color-primary); color: white; width: 100%; font-size: 1.05rem; padding: 14px;">
                            ✨ Novo Caso Clínico
                        </button>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <button class="btn btn-primary" id="restartBtn"
                                    style="background: white; color: var(--color-primary); border: 2px solid var(--color-primary);">
                                🔄 Recomeçar Este Caso
                            </button>
                            <button class="btn btn-primary" id="dashboardBtn"
                                    style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-subtle);">
                                🏠 Dashboard
                            </button>
                        </div>
                        <button class="btn btn-secondary" id="treinoLivreBtn"
                                style="width: 100%;">
                            🎯 Treino Livre por Habilidade
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('sessionContainer').innerHTML = html;
            document.getElementById('progressContainer').style.display = 'none';

            // ✅ Adicionar listeners aos botões de conclusão
            const newCaseBtn = document.getElementById('newCaseBtn');
            const restartBtn = document.getElementById('restartBtn');
            const dashboardBtn = document.getElementById('dashboardBtn');
            const treinoLivreBtn = document.getElementById('treinoLivreBtn');

            if (newCaseBtn) {
                console.log('✅ Botão Novo Caso encontrado, adicionando listener...');
                newCaseBtn.addEventListener('click', async () => {
                    console.log('🎯 Botão clicado!');
                    await startNewCase();
                });
            } else {
                console.error('❌ Botão newCaseBtn NÃO encontrado!');
            }

            if (restartBtn) restartBtn.addEventListener('click', restartJourney);
            if (dashboardBtn) dashboardBtn.addEventListener('click', () => window.location.href = '/lab');
            if (treinoLivreBtn) treinoLivreBtn.addEventListener('click', () => window.location.href = 'treino-livre.html');
        }

        // ========================================
        // INICIAR NOVO CASO CLÍNICO
        // ========================================
        async function startNewCase() {
            console.log('🎯 startNewCase() chamada');

            try {
                // Carregar lista de jornadas se não estiver carregada
                if (!availableJourneys || availableJourneys.length === 0) {
                    console.log('⚠️ Carregando lista de jornadas...');
                    await loadJourneys();
                }

                if (!availableJourneys || availableJourneys.length === 0) {
                    throw new Error('Nenhuma jornada disponível');
                }

                // Pegar próximo caso (circular)
                const currentIndex = availableJourneys.findIndex(j => j.id === currentJourneyId);
                const nextIndex = (currentIndex + 1) % availableJourneys.length;
                const nextJourney = availableJourneys[nextIndex];

                console.log(`✨ Carregando próximo caso: ${nextJourney.client_name} - ${nextJourney.disorder}`);

                // Limpar celebração e mostrar loading
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Carregando novo caso...</p>
                    </div>
                `;
                document.getElementById('progressContainer').style.display = 'block';

                // Limpar cache
                sessionsCache = {};
                lastLoadedJourney = null;

                // Salvar novo journey ID e recarregar
                localStorage.setItem('scopsy_current_journey_id', nextJourney.id);
                console.log(`💾 Novo caso salvo: ${nextJourney.id}`);

                // Recarregar página
                window.location.reload();

            } catch (error) {
                console.error('❌ Erro ao carregar novo caso:', error);
                alert(`Erro: ${error.message}`);
            }
        }

        // ========================================
        // RECOMEÇAR JORNADA (MESMO CASO)
        // ========================================
        async function restartJourney() {
            const journey = availableJourneys.find(j => j.id === currentJourneyId);
            const caseName = journey ? `${journey.client_name} (${journey.disorder})` : 'este caso';

            if (!confirm(`Tem certeza que deseja recomeçar ${caseName} do zero?\n\nSeu progresso atual será arquivado.`)) {
                return;
            }

            try {
                console.log('🔄 Recomeçando mesmo caso...');

                // Mostrar loading
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Recomeçando caso...</p>
                    </div>
                `;

                const response = await fetch(`${API_URL}/journey/${currentJourneyId}/restart`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Erro ao recomeçar');
                }

                console.log('✅ Caso recomeçado com sucesso');

                // Limpar cache de sessões para forçar reload
                sessionsCache = {};
                lastLoadedJourney = null;
                lastLoadedFilter = null;

                // Garantir que localStorage está atualizado
                localStorage.setItem('scopsy_current_journey_id', currentJourneyId);

                // Recarregar página para garantir estado limpo
                window.location.reload();

            } catch (error) {
                console.error('❌ Erro ao recomeçar:', error);
                alert('Erro ao recomeçar: ' + error.message);
            }
        }

        // ========================================
        // OBJETIVO DIDÁTICO POR SESSÃO
        // ========================================
        function generateContextualSummary(num) {
            const summaries = {
                1: "Início do tratamento — acolhimento, redução da ativação e construção de segurança.",
                2: "Aprofundamento da avaliação — identificação de padrões e impacto funcional.",
                3: "Psicoeducação — apresentação colaborativa do modelo cognitivo da TCC.",
                4: "Identificação de pensamentos automáticos — nomeação, gatilhos e emoções.",
                5: "Questionamento socrático — promoção de insight sobre previsões negativas.",
                6: "Reestruturação cognitiva — construção colaborativa de alternativas realistas.",
                7: "Experimentos comportamentais — teste de hipóteses e flexibilização de crenças.",
                8: "Confronto empático — flexibilização de regras rígidas e autocobrança.",
                9: "Metáforas — ampliação da flexibilidade cognitiva e emocional.",
                10: "Revisão de progresso — fortalecimento de autoeficácia e integração de ganhos.",
                11: "Prevenção de recaída — sinais de alerta, plano de manutenção e autonomia.",
                12: "Encerramento — integração do processo, rituais de alta e luto terapêutico saudável."
            };
            return summaries[num] || "";
        }

        // ========================================
        // INIT
        // ========================================
        init();

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
