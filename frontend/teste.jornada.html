<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Clínica - Scopsy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========== HEADER ========== */
        .header {
            background: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-btn {
            background: #f5f5f5;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-top: 8px;
        }

        /* ========== PROGRESS BAR ========== */
        .progress-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .session-counter {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .metric {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        /* ========== SESSION CARD ========== */
        .session-card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .session-header {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .session-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .session-phase {
            display: inline-block;
            padding: 6px 16px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ========== CONTEXT ========== */
        .context-section {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            margin-bottom: 32px;
        }

        .context-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-text {
            font-size: 15px;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap;
        }

        /* ========== DECISION ========== */
        .decision-section {
            margin-bottom: 32px;
        }

        .decision-prompt {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 12px;
            border-left: 4px solid #ffc107;
        }

        .options {
            display: grid;
            gap: 16px;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            gap: 16px;
        }

        .option:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-label {
            width: 40px;
            height: 40px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
        }

        .option-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }

        /* ========== FEEDBACK ========== */
        .feedback-section {
            background: #e8f5e9;
            padding: 24px;
            border-radius: 12px;
            border-left: 4px solid #4caf50;
            margin-top: 24px;
            display: none;
        }

        .feedback-section.show {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback-immediate {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 16px;
        }

        .feedback-explanation {
            font-size: 14px;
            line-height: 1.7;
            color: #555;
            padding: 16px;
            background: white;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .feedback-impact {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .impact-item {
            text-align: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
        }

        .impact-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .impact-value {
            font-size: 20px;
            font-weight: 700;
            color: #4caf50;
        }

        .impact-value.negative {
            color: #f44336;
        }

        /* ========== ACTIONS ========== */
        .actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* ========== LOADING ========== */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== COMPLETION CARD ========== */
        .completion-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 48px;
            border-radius: 16px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .completion-icon {
            font-size: 80px;
            margin-bottom: 24px;
        }

        .completion-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .completion-score {
            font-size: 48px;
            font-weight: 700;
            margin: 24px 0;
        }

        .completion-effectiveness {
            font-size: 24px;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        .completion-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 32px 0;
        }

        .completion-metric {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
        }

        .completion-metric-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .completion-metric-value {
            font-size: 32px;
            font-weight: 700;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }

            .feedback-impact {
                grid-template-columns: repeat(2, 1fr);
            }

            .completion-metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-top">
                <button class="back-btn" onclick="window.location.href='case.html'">
                    ← Voltar
                </button>
            </div>
            <h1>🌱 Jornada Clínica</h1>
            <p class="subtitle">Acompanhe um caso completo de TCC através de 12 sessões</p>
        </div>

        <!-- PROGRESS -->
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-header">
                <div class="progress-title">Progresso do Tratamento</div>
                <div class="session-counter" id="sessionCounter">Sessão 1/12</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 8.33%"></div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Rapport</div>
                    <div class="metric-value" id="metricRapport">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Insight</div>
                    <div class="metric-value" id="metricInsight">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Mudança</div>
                    <div class="metric-value" id="metricBehavioral">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Redução</div>
                    <div class="metric-value" id="metricSymptom">0</div>
                </div>
            </div>
        </div>

        <!-- SESSION CONTENT -->
        <div id="sessionContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando jornada...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const USER_ID = 8; // TODO: Pegar do auth
        
        // Hardcoded para primeira jornada (será dinâmico depois)
        let currentJourneyId = null;
        let currentSessionNumber = 1;
        let selectedOption = null;
        let sessionStartTime = null;

        // ========================================
        // INICIALIZAR
        // ========================================
        async function init() {
            try {
                // Buscar primeira jornada disponível
                const response = await fetch(`${API_URL}/journey/list`);
                const data = await response.json();

                if (!data.success || data.journeys.length === 0) {
                    throw new Error('Nenhuma jornada disponível');
                }

                currentJourneyId = data.journeys[0].id;
                
                // Verificar se já iniciou
                await checkProgress();

            } catch (error) {
                console.error('Erro ao inicializar:', error);
                document.getElementById('sessionContainer').innerHTML = `
                    <div class="session-card">
                        <p style="color: #f44336;">Erro ao carregar jornada: ${error.message}</p>
                    </div>
                `;
            }
        }

        // ========================================
        // VERIFICAR PROGRESSO
        // ========================================
        async function checkProgress() {
            try {
                const response = await fetch(`${API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`);
                const data = await response.json();

                if (data.progress) {
                    // Já iniciou
                    currentSessionNumber = data.progress.current_session;
                    updateProgress(data.progress);
                    loadSession(currentSessionNumber);
                } else {
                    // Primeira vez
                    await startJourney();
                }

            } catch (error) {
                console.error('Erro ao verificar progresso:', error);
            }
        }

        // ========================================
        // INICIAR JORNADA
        // ========================================
        async function startJourney() {
            try {
                const response = await fetch(`${API_URL}/journey/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        journey_id: currentJourneyId,
                        user_id: USER_ID
                    })
                });

                const data = await response.json();

                if (data.success) {
                    updateProgress(data.progress);
                    loadSession(1);
                }

            } catch (error) {
                console.error('Erro ao iniciar jornada:', error);
            }
        }

        // ========================================
        // CARREGAR SESSÃO
        // ========================================
        async function loadSession(sessionNumber) {
            try {
                sessionStartTime = Date.now();
                
                const response = await fetch(
                    `${API_URL}/journey/${currentJourneyId}/session/${sessionNumber}?user_id=${USER_ID}`
                );
                const data = await response.json();

                if (data.success) {
                    renderSession(data.session, data.previous_decision);
                    document.getElementById('progressContainer').style.display = 'block';
                }

            } catch (error) {
                console.error('Erro ao carregar sessão:', error);
            }
        }

        // ========================================
        // RENDERIZAR SESSÃO
        // ========================================
        function renderSession(session, previousDecision) {
            const phaseName = {
                'assessment': 'Avaliação',
                'psychoeducation': 'Psicoeducação',
                'intervention': 'Intervenção',
                'consolidation': 'Consolidação',
                'termination': 'Encerramento'
            }[session.session_phase] || session.session_phase;

            let html = `
                <div class="session-card">
                    <div class="session-header">
                        <h2 class="session-title">${session.session_title}</h2>
                        <span class="session-phase">${phaseName}</span>
                    </div>

                    <div class="context-section">
                        <div class="context-title">📋 Contexto da Sessão</div>
                        <div class="context-text">${session.context}</div>
                    </div>

                    ${session.homework_review ? `
                        <div class="context-section" style="border-left-color: #ff9800;">
                            <div class="context-title">📝 Review do Homework</div>
                            <div class="context-text">${session.homework_review}</div>
                        </div>
                    ` : ''}

                    <div class="decision-section">
                        <div class="decision-prompt">
                            💭 ${session.decision_prompt}
                        </div>

                        <div class="options" id="optionsContainer">
                            ${session.options.map(opt => `
                                <div class="option ${previousDecision && previousDecision.option_chosen === opt.label ? 'selected' : ''}" 
                                     data-option="${opt.label}"
                                     onclick="selectOption('${opt.label}')">
                                    <div class="option-label">${opt.label}</div>
                                    <div class="option-content">
                                        <div class="option-text">${opt.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="feedback-section" id="feedbackSection"></div>

                    <div class="actions">
                        ${previousDecision ? `
                            <button class="btn btn-primary" onclick="nextSession()">
                                Próxima Sessão →
                            </button>
                        ` : `
                            <button class="btn btn-primary" id="submitBtn" onclick="submitDecision()" disabled>
                                Confirmar Decisão
                            </button>
                        `}
                    </div>
                </div>
            `;

            document.getElementById('sessionContainer').innerHTML = html;

            // Se já tem decisão anterior, mostrar feedback
            if (previousDecision) {
                const option = session.options.find(o => o.label === previousDecision.option_chosen);
                if (option) {
                    showFeedback(option.feedback, previousDecision.option_chosen);
                }
            }
        }

        // ========================================
        // SELECIONAR OPÇÃO
        // ========================================
        function selectOption(label) {
            // Remover seleção anterior
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // Selecionar nova
            event.currentTarget.classList.add('selected');
            selectedOption = label;

            // Habilitar botão
            document.getElementById('submitBtn').disabled = false;
        }

        // ========================================
        // SUBMETER DECISÃO
        // ========================================
        async function submitDecision() {
            if (!selectedOption) return;

            try {
                const timeTaken = Math.floor((Date.now() - sessionStartTime) / 1000);

                // Desabilitar opções
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.add('disabled');
                    opt.onclick = null;
                });

                const response = await fetch(
                    `${API_URL}/journey/${currentJourneyId}/session/${currentSessionNumber}/decide`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            option_chosen: selectedOption,
                            time_taken_seconds: timeTaken,
                            user_id: USER_ID
                        })
                    }
                );

                const data = await response.json();

                if (data.success) {
                    showFeedback(data.feedback, selectedOption);
                    
                    // Atualizar progresso
                    await refreshProgress();

                    // Trocar botão
                    document.getElementById('submitBtn').outerHTML = `
                        <button class="btn btn-primary" onclick="nextSession()">
                            ${data.is_completed ? 'Ver Resultado Final →' : 'Próxima Sessão →'}
                        </button>
                    `;
                }

            } catch (error) {
                console.error('Erro ao submeter decisão:', error);
                alert('Erro ao registrar decisão. Tente novamente.');
            }
        }

        // ========================================
        // MOSTRAR FEEDBACK
        // ========================================
        function showFeedback(feedback, optionChosen) {
            const isOptimal = feedback.is_optimal;
            
            const html = `
                <div class="feedback-title">
                    ${isOptimal ? '✅ Excelente escolha!' : '💭 Feedback da Intervenção'}
                </div>
                <div class="feedback-immediate">
                    <strong>Reação do Cliente:</strong> ${feedback.immediate}
                </div>
                <div class="feedback-explanation">
                    <strong>📚 Explicação Técnica:</strong><br>
                    ${feedback.explanation}
                </div>
                <div class="feedback-impact">
                    <div class="impact-item">
                        <div class="impact-label">Rapport</div>
                        <div class="impact-value ${feedback.impact.rapport < 0 ? 'negative' : ''}">
                            ${feedback.impact.rapport > 0 ? '+' : ''}${feedback.impact.rapport}
                        </div>
                    </div>
                    <div class="impact-item">
                        <div class="impact-label">Insight</div>
                        <div class="impact-value ${feedback.impact.insight < 0 ? 'negative' : ''}">
                            ${feedback.impact.insight > 0 ? '+' : ''}${feedback.impact.insight}
                        </div>
                    </div>
                    <div class="impact-item">
                        <div class="impact-label">Mudança</div>
                        <div class="impact-value ${feedback.impact.behavioral_change < 0 ? 'negative' : ''}">
                            ${feedback.impact.behavioral_change > 0 ? '+' : ''}${feedback.impact.behavioral_change}
                        </div>
                    </div>
                    <div class="impact-item">
                        <div class="impact-label">Redução</div>
                        <div class="impact-value ${feedback.impact.symptom_reduction < 0 ? 'negative' : ''}">
                            ${feedback.impact.symptom_reduction > 0 ? '+' : ''}${feedback.impact.symptom_reduction}
                        </div>
                    </div>
                </div>
            `;

            const feedbackEl = document.getElementById('feedbackSection');
            feedbackEl.innerHTML = html;
            feedbackEl.classList.add('show');
        }

        // ========================================
        // ATUALIZAR PROGRESSO
        // ========================================
        function updateProgress(progress) {
            const percentage = (progress.current_session / 12) * 100;
            
            document.getElementById('sessionCounter').textContent = 
                `Sessão ${progress.current_session}/12`;
            document.getElementById('progressFill').style.width = `${percentage}%`;
            
            document.getElementById('metricRapport').textContent = progress.total_rapport;
            document.getElementById('metricInsight').textContent = progress.total_insight;
            document.getElementById('metricBehavioral').textContent = progress.total_behavioral_change;
            document.getElementById('metricSymptom').textContent = progress.total_symptom_reduction;
        }

        // ========================================
        // REFRESH PROGRESSO
        // ========================================
        async function refreshProgress() {
            try {
                const response = await fetch(
                    `${API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`
                );
                const data = await response.json();

                if (data.success && data.progress) {
                    updateProgress(data.progress);
                }
            } catch (error) {
                console.error('Erro ao atualizar progresso:', error);
            }
        }

        // ========================================
        // PRÓXIMA SESSÃO
        // ========================================
        async function nextSession() {
            // Verificar se completou
            const response = await fetch(
                `${API_URL}/journey/${currentJourneyId}/progress?user_id=${USER_ID}`
            );
            const data = await response.json();

            if (data.progress.is_completed) {
                showCompletion(data.progress);
            } else {
                currentSessionNumber++;
                selectedOption = null;
                loadSession(currentSessionNumber);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // ========================================
        // MOSTRAR CONCLUSÃO
        // ========================================
        function showCompletion(progress) {
            const effectivenessLabels = {
                'excellent': '🌟 Excelente',
                'good': '👍 Bom',
                'moderate': '📊 Moderado',
                'poor': '📉 Baixo'
            };

            const html = `
                <div class="completion-card">
                    <div class="completion-icon">🎉</div>
                    <div class="completion-title">Jornada Completa!</div>
                    <div class="completion-score">${progress.final_score}/100</div>
                    <div class="completion-effectiveness">
                        ${effectivenessLabels[progress.treatment_effectiveness]}
                    </div>
                    
                    <div class="completion-metrics">
                        <div class="completion-metric">
                            <div class="completion-metric-label">Rapport</div>
                            <div class="completion-metric-value">${progress.total_rapport}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Insight</div>
                            <div class="completion-metric-value">${progress.total_insight}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Mudança</div>
                            <div class="completion-metric-value">${progress.total_behavioral_change}</div>
                        </div>
                        <div class="completion-metric">
                            <div class="completion-metric-label">Redução</div>
                            <div class="completion-metric-value">${progress.total_symptom_reduction}</div>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="window.location.href='case.html'" 
                            style="background: white; color: #667eea; margin-top: 24px;">
                        Voltar ao Hub
                    </button>
                </div>
            `;

            document.getElementById('sessionContainer').innerHTML = html;
            document.getElementById('progressContainer').style.display = 'none';
        }

        // ========================================
        // INIT
        // ========================================
        init();
    </script>
