<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Scopsy</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <link rel="shortcut icon" href="favicon.png" />

    <!-- Config deve ser carregado PRIMEIRO -->
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1A2B48 0%, #2563EB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 36px;
            color: #2563EB;
            margin: 0;
        }

        .registered {
            font-size: 14px;
            vertical-align: super;
        }

        .logo p {
            color: #64748B;
            margin: 5px 0 0 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1A2B48;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1A2B48 0%, #2563EB 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
        }

        .footer-links a {
            color: #2563EB;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563EB;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>Scopsy<span class="registered">®</span></h1>
            <p>Treinamento Inteligente para Psicólogos</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    autocomplete="current-password" minlength="8">
            </div>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Entrando...</p>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Entrar
            </button>
        </form>

        <div class="footer-links">
            <p>Não tem conta? <a href="signup.html">Cadastre-se</a></p>
            <p><a href="index.html">← Voltar para home</a></p>
        </div>
    </div>

    <script>
        // API_URL vem do config.js (window.API_URL)

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            // Limpar mensagens
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validações básicas
            if (!email || !password) {
                errorDiv.textContent = 'Preencha todos os campos';
                errorDiv.style.display = 'block';
                return;
            }

            // Desabilitar botão
            loginBtn.disabled = true;
            loading.style.display = 'block';

            try {
                console.log('📡 Enviando login...');

                // Timeout de 10 segundos para login
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao fazer login');
                }

                console.log('✅ Login bem-sucedido:', data);

                // Salvar token e usuário
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Mensagem de sucesso
                successDiv.textContent = `Bem-vindo, ${data.user.name || data.user.email}!`;
                successDiv.style.display = 'block';

                // Redirecionar
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('❌ Erro no login:', error);

                if (error.name === 'AbortError') {
                    errorDiv.textContent = 'Tempo esgotado. Verifique sua conexão e tente novamente.';
                } else {
                    errorDiv.textContent = error.message || 'Erro ao conectar com servidor';
                }

                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Verificar se já está logado (apenas ao carregar página)
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');

            if (token) {
                console.log('🔑 Token encontrado, verificando validade...');

                // Mostrar mensagem enquanto verifica
                const successDiv = document.getElementById('successMessage');
                successDiv.textContent = 'Verificando sessão...';
                successDiv.style.display = 'block';

                // Timeout de 3 segundos para evitar travamento
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    signal: controller.signal
                })
                    .then(r => {
                        clearTimeout(timeoutId);
                        if (!r.ok) {
                            throw new Error('Token inválido');
                        }
                        return r.json();
                    })
                    .then(data => {
                        if (data.user) {
                            console.log('✅ Sessão válida, redirecionando...');
                            successDiv.textContent = `Bem-vindo de volta, ${data.user.name}!`;

                            // Aguardar 1 segundo antes de redirecionar
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 1000);
                        }
                    })
                    .catch((error) => {
                        clearTimeout(timeoutId);
                        if (error.name === 'AbortError') {
                            console.log('⏱️ Timeout: servidor não respondeu, removendo token...');
                        } else {
                            console.log('❌ Token inválido ou expirado, removendo...');
                        }
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        successDiv.style.display = 'none';
                    });
            }
        });
    </script>
</body>

</html>
