name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  agentshield:
    name: AgentShield Configuration Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AgentShield scan
        run: |
          npm install -g ecc-agentshield
          ecc-agentshield scan . --config .agentshield.json --format json > agentshield-report.json
        continue-on-error: true

      - name: Upload AgentShield report
        uses: actions/upload-artifact@v4
        with:
          name: agentshield-report
          path: agentshield-report.json

  eslint-security:
    name: ESLint Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security check
        run: npm run lint
        continue-on-error: true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: .eslintrc.json

  npm-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --json > audit-report.json
        continue-on-error: true

      - name: Check audit results
        run: |
          AUDIT_RESULT=$(npm audit --audit-level=moderate)
          if [ $? -ne 0 ]; then
            echo "⚠️  Vulnerabilities found. Review audit-report.json"
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [agentshield, eslint-security, npm-audit]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4

      - name: Create security summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scans Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ AgentShield Configuration Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint Security Rules Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ npm Audit Dependency Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reports available in job artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Check for critical failures
        if: needs.eslint-security.result == 'failure' || needs.npm-audit.result == 'failure'
        run: |
          echo "⚠️  Some security checks found issues. Review the detailed reports above."
          exit 1
