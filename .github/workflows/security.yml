name: Security Scanning (P0.2 AgentShield)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  npm-audit:
    name: npm audit vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate npm audit report
        if: always()
        run: npm audit --json > npm-audit-report.json
        continue-on-error: true

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: npm-audit-report.json
          retention-days: 30

  lint-security:
    name: ESLint security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  secrets-scan:
    name: Secrets detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  test-suite:
    name: Run tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

  security-gate:
    name: Security Gate Check
    runs-on: ubuntu-latest
    needs: [npm-audit, lint-security, secrets-scan, test-suite]
    if: always()
    steps:
      - name: Check security requirements
        run: |
          echo "✅ Security scanning completed"
          echo "Review artifacts for npm audit, lint, and secrets scan"
        continue-on-error: true

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security checks completed. Review artifacts for details." >> $GITHUB_STEP_SUMMARY
